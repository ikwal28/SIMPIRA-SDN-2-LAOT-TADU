<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SIMPIRA MENABUNG</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SIMPIRA" />
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=S&background=10b981&color=fff&size=512&font-size=0.65&bold=true" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Popup Install HTML -->
    <div id="pwa-install-popup" class="hidden fixed bottom-4 left-4 right-4 md:left-auto md:right-6 md:w-96 z-[9998] bg-white rounded-2xl shadow-2xl border border-slate-100 p-6 flex-col gap-4 transition-all duration-500">
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 bg-emerald-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-emerald-200">
          <img src="https://ui-avatars.com/api/?name=S&background=fff&color=10b981&size=128&font-size=0.65&bold=true" alt="Icon" class="w-8 h-8 rounded-lg" />
        </div>
        <div>
          <h3 class="font-bold text-slate-800 text-lg">Install SIMPIRA MENABUNG</h3>
          <p class="text-slate-500 text-sm leading-relaxed mt-1">
            Instal aplikasi agar akses lebih cepat seperti aplikasi mobile banking.
          </p>
        </div>
      </div>
      <div class="flex gap-3 mt-2">
        <button onclick="pwaInstall()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md shadow-emerald-100">
          Install
        </button>
        <button onclick="pwaLater()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-colors">
          Nanti saja
        </button>
      </div>
    </div>

    <script src="/install-pwa.js"></script>
    <script>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW Registered!', reg))
            .catch(err => console.log('SW Registration Failed!', err));
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
